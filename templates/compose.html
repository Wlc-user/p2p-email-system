<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写邮件 - 智能安全邮箱系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 30px; display: flex; align-items: center; }
        .back-link { color: white; text-decoration: none; margin-right: 20px; }
        .container { max-width: 900px; margin: 40px auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #333; }
        input[type="text"], input[type="email"], textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; transition: border-color 0.3s; }
        input:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { min-height: 200px; resize: vertical; font-family: inherit; }
        .btn-group { display: flex; gap: 15px; justify-content: flex-end; margin-top: 20px; }
        .btn { padding: 12px 30px; border: none; border-radius: 5px; font-size: 14px; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; }
        .hint { font-size: 12px; color: #999; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/dashboard" class="back-link">← 返回</a>
        <span>写邮件</span>
    </div>
    
    <div class="container">
        <form method="POST" action="/compose">
            <div class="form-group">
                <label>收件人</label>
                <input type="email" name="to" required placeholder="user@example.com">
                <p class="hint">多个收件人用逗号分隔</p>
            </div>
            
            <div class="form-group">
                <label>抄送 (可选)</label>
                <input type="email" name="cc" placeholder="cc@example.com">
            </div>
            
            <div class="form-group">
                <label>主题</label>
                <input type="text" name="subject" required placeholder="邮件主题">
            </div>
            
            <div class="form-group">
                <label>正文</label>
                <textarea name="body" required placeholder="请输入邮件内容..."></textarea>
            </div>
            
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">发送邮件</button>
                <button type="button" class="btn btn-secondary" onclick="location.href='/dashboard'">取消</button>
            </div>
        </form>
    </div>
</body>
</html>
