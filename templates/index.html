<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能安全邮箱系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .feature {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .feature h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .feature p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }
        
        .domain-selector {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .domain-btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .domain-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .domain-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 智能安全邮箱系统</h1>
        <p class="subtitle">企业级双域名邮箱解决方案</p>
        
        <div class="features">
            <div class="feature">
                <h3>🔒 安全加密</h3>
                <p>端到端加密，保护您的邮件隐私安全</p>
            </div>
            <div class="feature">
                <h3>⚡ 高性能</h3>
                <p>支持gRPC和QUIC协议，极速邮件传输</p>
            </div>
            <div class="feature">
                <h3>🌍 双域名</h3>
                <p>支持example1.com和example2.com双域名管理</p>
            </div>
            <div class="feature">
                <h3>🔍 智能搜索</h3>
                <p>快速搜索邮件，智能分类整理</p>
            </div>
        </div>
        
        <div class="domain-selector">
            <p style="margin-bottom: 10px; color: #666;">选择域名:</p>
            <a href="/login?domain=example1.com" class="domain-btn">example1.com</a>
            <a href="/login?domain=example2.com" class="domain-btn">example2.com</a>
        </div>
        
        <div class="actions">
            <a href="/login" class="btn btn-primary">登录邮箱</a>
            <a href="/register" class="btn btn-secondary">注册账号</a>
        </div>
    </div>
</body>
</html>
